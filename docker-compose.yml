services:
  postgres:
    image: postgres:16-alpine
    container_name: eui_ts_postgres
    environment:
      POSTGRES_USER: eui
      POSTGRES_PASSWORD: eui
      POSTGRES_DB: eui
    ports:
      - "5432:5432"
    volumes:
      - eui_ts_postgres:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eui -d eui"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  eui_ts_postgres:
